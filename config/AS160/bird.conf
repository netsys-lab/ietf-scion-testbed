# AS160 BGP fabric config -- generated by topology/gen_bird.py; DO NOT EDIT.
# Regenerate: python3 topology/gen_bird.py    Verify: gen_bird.py --check

log syslog all;
timeformat protocol iso long;  # linkd parses 'since' as YYYY-MM-DD HH:MM:SS
router id 10.160.0.1;

define FABRIC4 = [ 10.150.0.0/16, 10.151.0.0/16, 10.152.0.0/16, 10.153.0.0/16, 10.154.0.0/16, 10.155.0.0/16, 10.156.0.0/16, 10.157.0.0/16, 10.158.0.0/16, 10.159.0.0/16, 10.160.0.0/16, 10.161.0.0/16, 10.20.5.0/24 ];
define FABRIC6 = [ fd00:beef:150::/48, fd00:beef:151::/48, fd00:beef:152::/48, fd00:beef:153::/48, fd00:beef:154::/48, fd00:beef:155::/48, fd00:beef:156::/48, fd00:beef:157::/48, fd00:beef:158::/48, fd00:beef:159::/48, fd00:beef:160::/48, fd00:beef:161::/48, fd00:beef:5::/64 ];
define C_CUST = (65000, 1);  # customer-learned marker; gates exp_up

function fabric_net() {
  case net.type {
    NET_IP4: return net ~ FABRIC4;
    NET_IP6: return net ~ FABRIC6;
    else: return false;
  }
}

# Gao-Rexford-lite: pref customer 300 > peer 250 > core 200 > provider 100;
# exp_up (to provider/peer/core) exports own + customer-learned only.
filter imp_customer { if ! fabric_net() then reject; bgp_local_pref = 300; bgp_community.add(C_CUST); accept; }
filter imp_peer     { if ! fabric_net() then reject; bgp_local_pref = 250; accept; }
filter imp_core     { if ! fabric_net() then reject; bgp_local_pref = 200; accept; }
filter imp_provider { if ! fabric_net() then reject; bgp_local_pref = 100; accept; }
filter exp_customer { if ! fabric_net() then reject; accept; }
filter exp_up {
  if ! fabric_net() then reject;
  if source = RTS_STATIC then accept;
  if C_CUST ~ bgp_community then accept;
  reject;
}

protocol device { }

# krt_prefsrc: fabric-sourced ICMP (traceroute hops) reads as this AS's anchor.
protocol kernel kernel4 {
  ipv4 { export filter { if source = RTS_BGP then krt_prefsrc = 10.160.0.1; accept; }; };
}
protocol kernel kernel6 {
  ipv6 { export filter { if source = RTS_BGP then krt_prefsrc = fd00:beef:160::1; accept; }; };
}

protocol static originate4 {
  ipv4;
  route 10.160.0.0/16 blackhole;  # delivery: more-specific on-link /24 (networkd)
}
protocol static originate6 {
  ipv6;
  route fd00:beef:160::/48 blackhole;
}

protocol bfd {
  interface "sci*" { interval 500 ms; multiplier 4; };
}

protocol bgp bgp_if39652 {
  description "AS155 (parent) ifid 39652";
  local fd00:fade:15::160 as 160;
  neighbor fd00:fade:15::155 as 155;
  bfd on;
  ipv4 { import filter imp_provider; export filter exp_up; extended next hop on; };
  ipv6 { import filter imp_provider; export filter exp_up; };
}
