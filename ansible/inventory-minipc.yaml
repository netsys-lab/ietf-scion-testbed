# Inventory for the ietf-minipc-rack replica of the testbed.
#
# Identical internal 10.20.3.0/24 to ansible/inventory.yaml, but every host is
# reached by ProxyJump through the minipc host (ietf-minipc-rack, 10.0.0.50)
# instead of ietf-proxmox. The two mgmt planes are isolated bridges and never
# meet, so the IPs can be the same. The isolated known_hosts file avoids a
# host-key collision with the ietf-proxmox containers (same IP strings).
#
# ALWAYS run minipc playbooks with `-i ansible/inventory-minipc.yaml`.
# The `service`/dhcp-server host is intentionally absent — Kea is not deployed
# on this fleet (containers have static IPs; the host holds 10.20.3.1).
all:
  vars:
    ansible_ssh_common_args: >-
      -o ProxyJump=ietf-minipc-rack
      -o UserKnownHostsFile=/home/tony/.ssh/known_hosts_minipc
      -o StrictHostKeyChecking=accept-new
    wghub_dir: /home/tony/netsys/ietf-scion-testbed/.build/wghub-minipc

ases:
  hosts:
    AS1-150:
      ansible_host: 10.20.3.150
    AS1-151:
      ansible_host: 10.20.3.151
    AS1-152:
      ansible_host: 10.20.3.152
    AS1-153:
      ansible_host: 10.20.3.153
    AS1-154:
      ansible_host: 10.20.3.154
    AS1-155:
      ansible_host: 10.20.3.155
    AS1-156:
      ansible_host: 10.20.3.156
    AS1-157:
      ansible_host: 10.20.3.157
    AS1-158:
      ansible_host: 10.20.3.158
    AS1-159:
      ansible_host: 10.20.3.159
    AS1-160:
      ansible_host: 10.20.3.160
    AS1-161:
      ansible_host: 10.20.3.161

  vars:
    ansible_user: ietf
    ansible_python_interpreter: auto_silent

dashboard:
  hosts:
    fabric:
      ansible_host: 10.20.3.200
      ansible_user: ietf
  vars:
    ansible_python_interpreter: auto_silent

playground:
  hosts:
    play-158:
      ansible_host: 10.20.3.210
      playground_as: "158"
    play-152:
      ansible_host: 10.20.3.211
      playground_as: "152"
    play-155:
      ansible_host: 10.20.3.212
      playground_as: "155"
    play-161:
      ansible_host: 10.20.3.213
      playground_as: "161"
  vars:
    ansible_user: ietf
    ansible_python_interpreter: auto_silent

hub:
  hosts:
    wg-hub:
      ansible_host: 10.20.3.201
  vars:
    ansible_user: ietf
    ansible_python_interpreter: auto_silent

# Headless service endhosts (services hosted behind scitra; no booth machinery).
svc:
  hosts:
    svc-151:
      ansible_host: 10.20.3.214
      endhost_as: "151"
      scitra_extra_args: " -p 443 80"   # welcome.scion: forward SCION :443/:80 -> local server
    svc-150:
      ansible_host: 10.20.3.215
      endhost_as: "150"
      scitra_extra_args: " -p 443 80"   # web.scion: forward SCION :443/:80 -> local server
    svc-152:
      ansible_host: 10.20.3.216
      endhost_as: "152"
    svc-153:
      ansible_host: 10.20.3.217
      endhost_as: "153"
      scitra_extra_args: " -p 443 80"   # web2.scion: forward SCION :443/:80 -> local server
  vars:
    ansible_user: ietf
    ansible_python_interpreter: auto_silent

# ASes attendees can be endhosts in via WireGuard — return routes + hub egress.
# A deliberate mix: leaf ASes (158, 161), a core AS (152), and the tier-2 hub
# (155), so laptop attendees can join a core/transit AS, not only leaves.
wg_ases:
  hosts:
    AS1-152:
    AS1-155:
    AS1-158:
    AS1-161:

nodes:
  children:
    ases:
    dashboard:
    playground:
    hub:
    svc:
