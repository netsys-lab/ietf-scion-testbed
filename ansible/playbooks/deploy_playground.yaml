---
- name: Deploy SCION playground endhosts (Tier 1 attendee access)
  hosts: playground
  become: true
  vars:
    scion_bin_src: "{{ playbook_dir }}/../../.build/endhost/bin"
    # ttyd binds the MGMT interface; attendees reach it only through the
    # dashboard's /play/<as> reverse proxy (spec 2026-07-05, venue-footprint).
    pubnet_addr: "{{ ansible_eth0.ipv4.address }}"
  pre_tasks:
    - name: Fail fast if booth_code is not set
      ansible.builtin.assert:
        that:
          - booth_code is defined
          - booth_code | length > 0
        fail_msg: "booth_code is not set — copy ansible/group_vars/playground.yml.example to ansible/group_vars/playground.yml and set booth_code before deploying."
  tasks:
    - name: Install nftables
      ansible.builtin.apt:
        name: [nftables]
        state: present
        update_cache: true

    # ttyd is not packaged in Debian 12 (bookworm); install the upstream
    # static release binary to /usr/local/bin (matches ttyd.service.j2's
    # ExecStart path).
    - name: Install ttyd static binary
      ansible.builtin.get_url:
        url: https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
        dest: /usr/local/bin/ttyd
        mode: "0755"

    - name: Copy endhost binaries
      ansible.builtin.copy:
        src: "{{ scion_bin_src }}/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: "0755"
      loop: [scion, sciond, shim-dispatcher]

    - name: Copy guest login wrapper + setup script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/playground/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: "0755"
      loop: [guest-login.sh, guest-setup.sh]

    - name: Create SCION config dir
      ansible.builtin.file:
        path: /etc/scion/certs
        state: directory
        mode: "0755"

    - name: Copy AS topology + TRC (public material only)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../config/AS{{ playground_as }}/{{ item.s }}"
        dest: "/etc/scion/{{ item.d }}"
        mode: "0644"
      loop:
        - { s: "topology.json", d: "topology.json" }
        - { s: "certs/ISD1-B1-S1.trc", d: "certs/ISD1-B1-S1.trc" }

    - name: Render sciond + shim config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/playground/{{ item.s }}"
        dest: "{{ item.d }}"
        mode: "0644"
      loop:
        - { s: "sd.toml.j2",  d: "/etc/scion/sd.toml" }
        - { s: "shim.toml.j2", d: "/etc/scion/shim.toml" }
        - { s: "motd.j2",      d: "/etc/motd" }

    - name: Run guest sandbox setup
      ansible.builtin.command: /usr/local/bin/guest-setup.sh
      changed_when: false

    - name: Install SCION + ttyd systemd units
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/playground/{{ item }}"
        dest: "/etc/systemd/system/{{ item }}"
        mode: "0644"
      loop: [scion-shim.service, scion-sciond.service]

    - name: Render ttyd unit (booth code + mgmt bind)
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/playground/ttyd.service.j2"
        dest: /etc/systemd/system/ttyd.service
        mode: "0644"

    - name: Install nftables containment
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/playground/nftables.conf"
        dest: /etc/nftables.conf
        mode: "0644"

    - name: Enable + start everything
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: restarted
        daemon_reload: true
      loop: [nftables, scion-shim, scion-sciond, ttyd]

    - name: Verify sciond answers locally
      ansible.builtin.command: /usr/local/bin/scion showpaths 1-159 --sciond 127.0.0.1:30255 --maxpaths 1
      register: sp
      changed_when: false
      failed_when: sp.rc != 0
      # AS159->159 self is degenerate; for play-158 target a different AS.
      when: playground_as != "159"
