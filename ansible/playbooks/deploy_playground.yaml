---
- name: Deploy SCION playground endhosts (Tier 1 attendee access)
  hosts: playground
  become: true
  vars:
    scion_bin_src: "{{ playbook_dir }}/../../.build/endhost/bin"
    # ttyd binds the MGMT interface; attendees reach it only through the
    # dashboard's /play/<as> reverse proxy (spec 2026-07-05, venue-footprint).
    pubnet_addr: "{{ ansible_eth0.ipv4.address }}"
  pre_tasks:
    - name: Fail fast if booth_code is not set
      ansible.builtin.assert:
        that:
          - booth_code is defined
          - booth_code | length > 0
        fail_msg: "booth_code is not set — copy ansible/group_vars/playground.yml.example to ansible/group_vars/playground.yml and set booth_code before deploying."
  tasks:
    - name: Install nftables + scitra runtime deps + iperf3
      ansible.builtin.apt:
        name: [nftables, libncurses6, iperf3, traceroute, tcpdump, mtr-tiny]
        state: present
        update_cache: true

    # File caps so guests (uid 2000, no sudo) can capture on eth0 — same
    # posture as the scapy raw-socket caps that already survive on these
    # unprivileged CTs. Ubuntu ships tcpdump without caps (root-only).
    - name: tcpdump usable without root
      ansible.builtin.shell: |
        getcap /usr/bin/tcpdump | grep -q cap_net_raw && echo HAVE || setcap cap_net_raw,cap_net_admin+eip /usr/bin/tcpdump
      register: tcpdump_caps
      changed_when: "'HAVE' not in tcpdump_caps.stdout"

    # ttyd is not in the base distro repos (neither Debian nor Ubuntu 24.04);
    # install the upstream static release binary to /usr/local/bin (matches
    # ttyd.service.j2's ExecStart path).
    - name: Install ttyd static binary
      ansible.builtin.get_url:
        url: https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
        dest: /usr/local/bin/ttyd
        mode: "0755"

    - name: Copy endhost binaries
      ansible.builtin.copy:
        src: "{{ scion_bin_src }}/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: "0755"
      loop: [scion, sciond, shim-dispatcher]

    - name: Copy scitra-tun binary
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../.build/scitra/bin/scitra-tun"
        dest: /usr/local/bin/scitra-tun
        mode: "0755"

    - name: Copy guest login wrapper + setup script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/playground/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: "0755"
      loop: [guest-login.sh, guest-setup.sh]

    - name: Create guest.slice drop-in dir
      ansible.builtin.file:
        path: /etc/systemd/system/guest.slice.d
        state: directory
        mode: "0755"

    - name: Cap guest shell CPU (guest.slice drop-in)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/playground/guest-slice-cpu.conf"
        dest: /etc/systemd/system/guest.slice.d/cpu.conf
        mode: "0644"
      register: guest_slice_cpu

    - name: Reload systemd to realize slice limits
      ansible.builtin.systemd:
        daemon_reload: true
      when: guest_slice_cpu.changed

    - name: Create SCION config dir
      ansible.builtin.file:
        path: /etc/scion/certs
        state: directory
        mode: "0755"

    - name: Copy AS topology + TRC (public material only)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../config/AS{{ playground_as }}/{{ item.s }}"
        dest: "/etc/scion/{{ item.d }}"
        mode: "0644"
      loop:
        - { s: "topology.json", d: "topology.json" }
        - { s: "certs/ISD1-B1-S1.trc", d: "certs/ISD1-B1-S1.trc" }

    - name: Render sciond + shim config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/playground/{{ item.s }}"
        dest: "{{ item.d }}"
        mode: "0644"
      loop:
        - { s: "sd.toml.j2",  d: "/etc/scion/sd.toml" }
        - { s: "shim.toml.j2", d: "/etc/scion/shim.toml" }
        - { s: "motd.j2",      d: "/etc/motd" }

    - name: Run guest sandbox setup
      ansible.builtin.command: /usr/local/bin/guest-setup.sh
      changed_when: false

    - name: Install SCION + ttyd + iperf3 systemd units
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/playground/{{ item }}"
        dest: "/etc/systemd/system/{{ item }}"
        mode: "0644"
      loop: [scion-shim.service, scion-sciond.service, iperf3-server.service]

    - name: Render ttyd unit (booth code + mgmt bind)
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/playground/ttyd.service.j2"
        dest: /etc/systemd/system/ttyd.service
        mode: "0644"

    - name: Render scitra unit (replaces scion-shim as the SCMP echo responder)
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/playground/scitra.service.j2"
        dest: /etc/systemd/system/scitra.service
        mode: "0644"

    - name: Install nftables containment
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/playground/nftables.conf"
        dest: /etc/nftables.conf
        mode: "0644"

    # scitra --scmp owns UDP/30041 and cannot coexist with the shim
    # (A7 finding); scitra transparently answers SCMP echo in its place, so
    # `scion ping` targets keep working. Shim unit file stays installed as a
    # rollback path (see Conflicts= in scitra.service.j2).
    - name: Stop + disable scion-shim (superseded by scitra --scmp)
      ansible.builtin.systemd:
        name: scion-shim
        enabled: false
        state: stopped

    - name: Enable + start everything
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: restarted
        daemon_reload: true
      loop: [nftables, scion-sciond, scitra, ttyd, iperf3-server]

    - name: Verify sciond answers locally
      ansible.builtin.command: /usr/local/bin/scion showpaths 1-150 --sciond 127.0.0.1:30255 --maxpaths 1
      register: sp
      changed_when: false
      failed_when: sp.rc != 0
      retries: 5
      delay: 2
      until: sp.rc == 0
