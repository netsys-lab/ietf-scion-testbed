---
- name: Deploy fabricd dashboard backend to the dashboard container
  hosts: dashboard
  become: true
  vars_files:
    - "{{ playbook_dir }}/../group_vars/playground.yml"
  vars:
    fabricd_deb: "{{ playbook_dir }}/../../dashboard/backend/dist/fabricd_0.1.1_amd64.deb"
  pre_tasks:
    - name: Fail fast if on-site join vars are unset
      # The on-site flow sets these in group_vars/playground.yml and reruns
      # this play; a missing key would otherwise render a half-config AFTER
      # dpkg + restart, leaving a partial/bounced deploy.
      ansible.builtin.assert:
        that:
          - booth_code is defined
          - booth_code | length > 0
          # Both endpoint keys must exist (config.toml renders both), but only
          # ONE need be non-empty: the venue is v6-mostly, yet a v4-only network
          # must still deploy (fabricd falls back to the v4 endpoint — see
          # update-wg-endpoint.sh + primaryEndpointStr in join.go).
          - wg_endpoint_v6 is defined
          - wg_endpoint_v4 is defined
          - (wg_endpoint_v4 | length > 0) or (wg_endpoint_v6 | length > 0)
          - venue_allowed_v4 is defined
          - venue_allowed_v4 | length > 0
          - venue_allowed_v6 is defined
          - venue_allowed_v6 | length > 0
        fail_msg: "booth_code / venue_allowed_v4 / venue_allowed_v6 must be set and at least one of wg_endpoint_v4 / wg_endpoint_v6 must be non-empty in ansible/group_vars/playground.yml before deploying the dashboard."
  tasks:
    - name: Copy fabricd package
      ansible.builtin.copy:
        src: "{{ fabricd_deb }}"
        dest: /tmp/fabricd.deb
        mode: "0644"

    - name: Install fabricd (dpkg -i always reinstalls the shipped deb, even on an identical version — apt/apt-get no-op on same-version)
      ansible.builtin.command:
        cmd: dpkg -i /tmp/fabricd.deb
      register: fabricd_dpkg
      changed_when: "'already installed' not in fabricd_dpkg.stdout"

    - name: Ensure fabricd config dirs exist (deb ships no config tree)
      ansible.builtin.file:
        path: "/etc/fabric/config/AS{{ item }}"
        state: directory
        mode: "0755"
      loop: "{{ range(150, 162) | list }}"

    - name: Copy AS topologies (fabricd reads only these)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../config/AS{{ item }}/topology.json"
        dest: "/etc/fabric/config/AS{{ item }}/topology.json"
        mode: "0644"
      loop: "{{ range(150, 162) | list }}"

    - name: Copy AS core list
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../config/as_list.yml"
        dest: /etc/fabric/config/as_list.yml
        mode: "0644"

    - name: Ensure joinable-AS certs dirs exist (for bundle TRCs)
      ansible.builtin.file:
        path: "/etc/fabric/config/AS{{ item }}/certs"
        state: directory
        mode: "0755"
      loop: [152, 155, 158, 161]

    - name: Copy TRC for joinable ASes (fabricd's /api/join/bundle reads these)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../config/AS{{ item }}/certs/ISD1-B1-S1.trc"
        dest: "/etc/fabric/config/AS{{ item }}/certs/ISD1-B1-S1.trc"
        mode: "0644"
      loop: [152, 155, 158, 161]

    # copy is additive (it never deletes files absent from the source), so a
    # removed instruction file lingers on the host forever. Purge the dir first
    # to make the copy authoritative. Instructions are repo-sourced only (no
    # host-only files here), so a clean reset is safe.
    - name: Reset instructions dir (authoritative — purge files removed from the repo)
      ansible.builtin.file:
        path: /etc/fabric/instructions
        state: absent

    - name: Copy attendee instructions content
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../dashboard/instructions/"
        dest: /etc/fabric/instructions/
        mode: "0644"

    # Public-by-design testbed CA (hev3/web.scion TLS): the join page offers
    # it at /api/join/ca.pem so laptop attendees can curl --cacert.
    - name: Ensure /etc/fabricd exists
      ansible.builtin.file:
        path: /etc/fabricd
        state: directory
        mode: "0755"
    - name: Copy testbed TLS CA for the join page
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/hev3-ca/ca.pem"
        dest: /etc/fabricd/hev3-ca.pem
        mode: "0644"

    - name: Ensure fabricd RTT-baseline persistence directory exists
      ansible.builtin.file:
        path: /var/lib/fabricd
        state: directory
        owner: root
        group: root
        mode: "0750"
      # fabricd runs as root (fabricd.service sets no User=, and the deb
      # ships no postinst creating a dedicated account), so root:root
      # matches the process that will write baselines.json here.

    - name: Configure fabricd (enable RTT-baseline persistence)
      ansible.builtin.copy:
        dest: /etc/fabricd/config.toml
        mode: "0644"
        content: |
          listen = ":8080"
          config_dir = "/etc/fabric/config"
          static_dir = "/usr/share/fabricd/web"
          scrape_interval_ms = 1000
          mock = false
          baselines_path = "/var/lib/fabricd/baselines.json"

          join_enabled = true
          booth_code = "{{ booth_code }}"
          isd = 1
          joinable_ases = [152, 155, 158, 161]
          wg_pool_path = "/var/lib/fabricd/wg-pool.json"
          wg_state_path = "/var/lib/fabricd/wg-claims.json"
          instructions_dir = "/etc/fabric/instructions"
          endpoint_v6 = "{{ wg_endpoint_v6 }}"
          endpoint_v4 = "{{ wg_endpoint_v4 }}"
          wg_listen_port = 51820
          hub_probe_addr = "10.20.3.201:22"
          # Per-AS end-host bootstrap server (deploy_bootstrap_server.yaml),
          # surfaced on the join page as a clickable URL per joinable AS.
          bootstrap_url_template = "http://10.20.3.%d:8041"
          hev3_ca_file = "/etc/fabricd/hev3-ca.pem"
          # Venue NAT64 puts many attendees behind one source IP; 30/min
          # absorbs a booth-opening rush while still bounding brute force.
          claim_rate_max = 30

          [play_proxy]
          158 = "10.20.3.210:7681"
          152 = "10.20.3.211:7681"
          155 = "10.20.3.212:7681"
          161 = "10.20.3.213:7681"

          [idint]
          enabled = true
          prober_port = 30490
          reflector_port = 32001
          probe_interval_ms = 1000

    - name: Ensure service is running
      ansible.builtin.systemd:
        name: fabricd
        daemon_reload: true
        state: restarted
        enabled: true

    - name: Wait for API
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:8080/api/health"
      register: health
      retries: 5
      delay: 2
      until: health.status == 200

    # Venue firewall — placed last so it applies only after fabricd is up and
    # healthy. The input chain allows established + :8080 (mgmt unrestricted;
    # venue leg allowlisted to venue_allowed_*) + eth0:22, and ansible
    # connects over mgmt eth0, so this cannot lock the play out of its own
    # SSH session.
    - name: Ensure nftables present (dashboard venue firewall)
      ansible.builtin.apt:
        name: nftables
        state: present
        update_cache: true

    - name: Install dashboard nftables ruleset (venue-facing default-drop input)
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/dashboard/nftables.conf.j2"
        dest: /etc/nftables.conf
        mode: "0644"
        validate: "/usr/sbin/nft -c -f %s"

    - name: Enable + (re)start nftables
      ansible.builtin.systemd:
        name: nftables
        enabled: true
        state: restarted
        daemon_reload: true
