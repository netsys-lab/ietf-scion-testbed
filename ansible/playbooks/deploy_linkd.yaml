---
- name: Deploy scion-linkd to all AS containers
  hosts: ases
  become: true
  vars:
    linkd_deb: "{{ playbook_dir }}/../../linkd/dist/scion-linkd_0.2.0_amd64.deb"
    asnum: "{{ ansible_host.split('.')[-1] }}"
  tasks:
    - name: Copy scion-linkd package
      ansible.builtin.copy:
        src: "{{ linkd_deb }}"
        dest: /tmp/scion-linkd.deb
        mode: "0644"

    - name: Install scion-linkd
      ansible.builtin.apt:
        deb: /tmp/scion-linkd.deb
        state: present
        force: true

    - name: Copy beacon metadata base and baseline profile
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../config/AS{{ asnum }}/{{ item }}"
        dest: "/etc/scion/AS{{ asnum }}/{{ item }}"
        mode: "0644"
      loop:
        - staticInfoConfig.base.json
        - linkd-baseline.json

    - name: Configure scion-linkd to bind the management address
      ansible.builtin.copy:
        dest: /etc/scion-linkd/config.toml
        mode: "0644"
        content: |
          listen = "{{ ansible_host }}:30480"
          topology_glob = "/etc/scion/AS*/topology.json"
          staticinfo_base = "/etc/scion/AS*/staticInfoConfig.base.json"
          # Concrete per-AS path: the writer's atomic temp-file create uses this
          # verbatim (unlike the glob-resolved *_base/baseline reads), so a
          # literal "AS*" here makes every write fail on a nonexistent dir.
          staticinfo_out = "/etc/scion/AS{{ asnum }}/staticInfoConfig.json"
          baseline_profile = "/etc/scion/AS*/linkd-baseline.json"
          cs_reload_unit = "{{ linkd_cs_unit | default('scion-control@cs1-' + asnum + '-1') }}"

    - name: Ensure service is running
      ansible.builtin.systemd:
        name: scion-linkd
        state: restarted
        enabled: true

    - name: Wait for API
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:30480/healthz"
      register: health
      retries: 5
      delay: 2
      until: health.status == 200
