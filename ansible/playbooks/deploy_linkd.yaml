---
- name: Deploy scion-linkd to all AS containers
  hosts: ases
  become: true
  vars:
    linkd_deb: "{{ playbook_dir }}/../../linkd/dist/scion-linkd_0.3.2_amd64.deb"
    asnum: "{{ ansible_host.split('.')[-1] }}"
  tasks:
    - name: Copy scion-linkd package
      ansible.builtin.copy:
        src: "{{ linkd_deb }}"
        dest: /tmp/scion-linkd.deb
        mode: "0644"

    - name: Install scion-linkd (dpkg -i always reinstalls the shipped deb, even on an identical version — apt/apt-get no-op on same-version)
      ansible.builtin.command:
        cmd: dpkg -i /tmp/scion-linkd.deb
      register: linkd_dpkg
      changed_when: "'already installed' not in linkd_dpkg.stdout"

    - name: Copy beacon metadata base and baseline profile
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../config/AS{{ asnum }}/{{ item }}"
        dest: "/etc/scion/AS{{ asnum }}/{{ item }}"
        mode: "0644"
      loop:
        - staticInfoConfig.base.json
        - linkd-baseline.json

    - name: Seed staticInfoConfig.json at nominal on deploy (linkd's writer then tracks shaping live)
      ansible.builtin.copy:
        remote_src: true
        src: "/etc/scion/AS{{ asnum }}/staticInfoConfig.base.json"
        dest: "/etc/scion/AS{{ asnum }}/staticInfoConfig.json"
        mode: "0644"
      register: staticinfo_installed

    - name: Reload CS to pick up the (re)installed static advertisements
      ansible.builtin.command:
        cmd: "systemctl kill --signal=SIGHUP {{ linkd_cs_unit | default('scion-control@cs1-' + asnum + '-1') }}"
      when: staticinfo_installed.changed

    - name: Configure scion-linkd to bind the management address
      ansible.builtin.copy:
        dest: /etc/scion-linkd/config.toml
        mode: "0644"
        content: |
          listen = "{{ ansible_host }}:30480"
          topology_glob = "/etc/scion/AS*/topology.json"
          baseline_profile = "/etc/scion/AS*/linkd-baseline.json"
          # shape-driven beacon metadata -> rewrite staticInfoConfig.json + SIGHUP CS
          staticinfo_base = "/etc/scion/AS{{ asnum }}/staticInfoConfig.base.json"
          staticinfo_out = "/etc/scion/AS{{ asnum }}/staticInfoConfig.json"
          cs_reload_unit = "scion-control@cs1-{{ asnum }}-1"
          # shape-driven ID-INT capacity -> rewrite topology.json idint.speed + SIGHUP BR
          topology_base = "/etc/scion/AS{{ asnum }}/topology.base.json"
          topology_out = "/etc/scion/AS{{ asnum }}/topology.json"
          br_reload_unit = "scion-router@br1-{{ asnum }}-1"

    - name: Ensure service is running
      ansible.builtin.systemd:
        name: scion-linkd
        state: restarted
        enabled: true

    - name: Wait for API
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:30480/healthz"
      register: health
      retries: 5
      delay: 2
      until: health.status == 200
