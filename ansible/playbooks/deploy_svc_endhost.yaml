---
- name: Deploy svc endhosts (SCION endhost + scitra, services live behind scitra)
  hosts: svc
  become: true
  tasks:
    - name: Install scitra runtime deps + curl (debug) + ufw + fail2ban
      ansible.builtin.apt:
        name: [libncurses6, curl, ufw, fail2ban, traceroute, tcpdump, mtr-tiny, iperf3]
        state: present
        update_cache: true

    - name: QUIC UDP buffer sysctls (silences quic-go rmem warning on every hev3 run; improves h3 throughput)
      ansible.builtin.copy:
        dest: /etc/sysctl.d/90-quic-buffers.conf
        mode: "0644"
        content: |
          net.core.rmem_max=8388608
          net.core.wmem_max=8388608
      register: quic_sysctl

    - name: Apply sysctls
      ansible.builtin.command: sysctl --system
      when: quic_sysctl.changed
      changed_when: true

    - name: tcpdump usable without root
      ansible.builtin.shell: |
        getcap /usr/bin/tcpdump | grep -q cap_net_raw && echo HAVE || setcap cap_net_raw,cap_net_admin+eip /usr/bin/tcpdump
      register: tcpdump_caps
      changed_when: "'HAVE' not in tcpdump_caps.stdout"

    - name: Enable + start fail2ban (default sshd jail — brute-force protection)
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started

    # svc-151 has a venue leg (eth1 on vmbr0) so DNS etc. are reachable by
    # regular-IP clients. The venue net is globally routable, so lock it down:
    # deny incoming by default, trust only the isolated mgmt bridge (eth0).
    # Open specific venue-leg ports (e.g. DNS 53, ideally scoped to venue/lab
    # prefixes) deliberately when the service is deployed. Configured via ufw's
    # CLI (idempotent) to avoid a galaxy collection dependency.
    - name: ufw baseline (deny incoming, allow outgoing, trust mgmt eth0)
      ansible.builtin.command: "{{ item }}"
      loop:
        - ufw default deny incoming
        - ufw default allow outgoing
        - ufw allow in on eth0
        - ufw --force enable
      changed_when: false

    # svc-151 is a PRIVILEGED container, so file capabilities persist: let a
    # non-root user (ietf) run plain `ping` without sudo. (No-op / harmless if
    # the container were unprivileged — the cap would just be stripped.)
    - name: Allow non-root ping (cap_net_raw on the ping binary)
      ansible.builtin.command: setcap cap_net_raw+ep /usr/bin/ping
      changed_when: false

    - name: Copy endhost + tool binaries
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../.build/{{ item.src }}"
        dest: "/usr/local/bin/{{ item.dest }}"
        mode: "0755"
      loop:
        - { src: "endhost/bin/scion", dest: "scion" }
        - { src: "endhost/bin/sciond", dest: "sciond" }
        - { src: "scitra/bin/scitra-tun", dest: "scitra-tun" }
        - { src: "idint-traceroute/bin/idint-traceroute", dest: "idint-traceroute" }

    - name: Install HTTP/3 curl (shadows distro curl on PATH)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../.build/curl/bin/curl"
        dest: /usr/local/bin/curl
        mode: "0755"

    - name: Create SCION config dir
      ansible.builtin.file:
        path: /etc/scion/certs
        state: directory
        mode: "0755"

    - name: Copy AS topology + TRC (public material only)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../config/AS{{ endhost_as }}/{{ item.s }}"
        dest: "/etc/scion/{{ item.d }}"
        mode: "0644"
      loop:
        - { s: "topology.json", d: "topology.json" }
        - { s: "certs/ISD1-B1-S1.trc", d: "certs/ISD1-B1-S1.trc" }

    - name: Render sciond config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/svc/sd.toml.j2"
        dest: /etc/scion/sd.toml
        mode: "0644"

    - name: Install sciond unit (endhost-generic, reused from playground)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/playground/scion-sciond.service"
        dest: /etc/systemd/system/scion-sciond.service
        mode: "0644"

    - name: Render scitra unit
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/svc/scitra.service.j2"
        dest: /etc/systemd/system/scitra.service
        mode: "0644"

    - name: Enable + start services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: restarted
        daemon_reload: true
      loop: [scion-sciond, scitra]

    - name: Verify sciond answers locally
      ansible.builtin.command: /usr/local/bin/scion showpaths 1-150 --sciond 127.0.0.1:30255 --maxpaths 1
      register: sp
      changed_when: false
      failed_when: sp.rc != 0
      retries: 5
      delay: 2
      until: sp.rc == 0
