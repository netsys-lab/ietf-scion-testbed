#!/usr/sbin/nft -f
flush ruleset

table inet playground {
    chain output {
        type filter hook output priority 0; policy accept;

        # Only constrain the guest user; root services (sciond/shim) unaffected.
        meta skuid != 2000 accept

        # guest -> local sciond over loopback
        oif "lo" accept

        # guest -> scitra TUN (IPv6 apps over SCION); fc00::/8 only exists app<->TUN
        ip6 daddr fc00::/8 accept

        # guest -> SCION internal plane (CS gRPC + BR internal + shim targets)
        ip daddr 10.20.3.0/24 udp dport 30041 accept
        ip daddr 10.20.3.0/24 udp dport 31000-31100 accept
        ip daddr 10.20.3.0/24 tcp dport 31000-31044 accept
        # same-AS direct underlay to WG attendees (Tier 2 clients)
        ip daddr 10.20.5.0/24 meta l4proto udp accept
        # guest -> fleet DNS (CoreDNS on svc-152: .scion names + Quad9 forward).
        # Deliberately NOT the venue/internet: guest hev3 races are SCION-only.
        ip daddr 10.20.3.216 udp dport 53 accept
        ip daddr 10.20.3.216 tcp dport 53 accept
        # debugging
        ip daddr 10.20.3.0/24 icmp type echo-request accept

        # established replies for allowed flows
        ct state established,related accept

        # everything else from guest is dropped (no internet, no SSH, no metrics)
        counter drop
    }
}
