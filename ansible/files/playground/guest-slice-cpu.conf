# Installed to /etc/systemd/system/guest.slice.d/cpu.conf by
# deploy_playground.yaml. Attendee shells land in guest.slice
# (guest-login.sh: systemd-run --scope --slice=guest.slice), so this caps
# ALL guest sessions collectively: at most 80% of the container's single
# core, and a low weight so scitra/sciond/ttyd win in-container contention.
# Proxmox cpuunits arbitrate BETWEEN containers; this arbitrates inside.
[Slice]
CPUQuota=80%
CPUWeight=20
